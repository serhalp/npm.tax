name: 📦 Analyze Bundle

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle-analyze:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 26.3.0
          cache: pnpm
      - name: Prepare Socket Firewall
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - name: Install deps (Socket Firewall ✔️)
        run: sfw pnpm ci

      - run: pnpm run build:analyze

      - name: Deploy bundle analysis to Netlify
        run: |
          mv .sonda/bundle.html .sonda/index.html
          DEPLOY_JSON=$(pnpm exec netlify deploy --allow-anonymous --dir ./.sonda --no-build --json)
          DEPLOY_URL=$(echo "$DEPLOY_JSON" | jq -r '.deploy_url')
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
          {
            echo "## Bundle analysis"
            echo ""
            echo "Sonda report: <$DEPLOY_URL>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "Sonda bundle report: $DEPLOY_URL" \
            --edit-last --create-if-none
